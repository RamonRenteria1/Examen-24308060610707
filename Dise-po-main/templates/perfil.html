{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="card border-primary">
                
                <div class="card-header bg-primary text-white text-center">
                    <h3 class="mb-0">Editar Perfil</h3>
                </div>

                <div class="card-body bg-white">
                    <form action="/actualizar-perfil" method="POST">
                        
                        <div class="mb-3">
                            <label for="nombre" class="form-label text-primary fw-bold">Nombre Completo</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Tu nombre" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label text-primary fw-bold">Correo Electrónico</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="correo@ejemplo.com" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-primary fw-bold">Nueva Contraseña</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Dejar en blanco si no deseas cambiarla">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                Guardar Cambios
                            </button>
                            <a href="/perfil" class="btn btn-outline-secondary btn-sm">
                                Cancelar y volver
                            </a>
                        </div>

                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
