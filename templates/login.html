{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-lg p-4">
            <div class="card-body text-center">
                <div class="mb-4">
                    <span class="fs-1"></span>
                    <h3 class="fw-bold text-primary mt-2">Bienvenido</h3>
                    <p class="text-muted small">Inicia sesión para gestionar tus tareas</p>
                </div>
                <form method="POST">
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold text-muted">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold text-muted">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    
                    <div class="mb-4 text-end">
                        <a href="{{ url_for('recuperar') }}" class="small text-decoration-none text-primary">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2">Entrar</button>
                </form>
                <p class="mt-4 small">¿Eres nuevo? <a href="{{ url_for('registro') }}" class="fw-bold">Regístrate</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
